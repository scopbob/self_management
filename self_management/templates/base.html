{% load static %}
<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" href="{% static 'style.css' %}">
    {% block link %}{% endblock %}
    <title>{% block title %}{% endblock %}</title>
  </head>
  <body>
    <header>
      <nav>
        {% if user.is_authenticated %}
        <form action="{% url 'accounts:logout' %}" method="post">{% csrf_token %}
          <ul>
            <li><a href={% url "todo:index" %}>To do</a></li>
            <li><a href={% url "todo:category_index" %}>category</a></li>
            <li><button type="submit">Log out</button></li>
          </ul>
        </form>
        {% else %}
        <h3>You need Log in</h3>
        {% endif %}
      </nav>
    </header>
    <div id="content">
      {% block content %}{% endblock %}
    </div>
  </body>
</html>
