{% load static %}
<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    {% block link %}{% endblock %}
    <title>{% block title %}{% endblock %}</title>
    <style>{% block style %}{% endblock %}</style>
    <link rel="icon" type="image/x-icon" href="{% static 'images\favicon.ico' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
  </head>
  <body>
      <div class="container">
        <header class="d-flex flex-wrap align-items-center justify-content-center justify-content-md-between py-3 mb-4 border-bottom">
          <div class="col-md-3 mb-2 mb-md-0">
            <a href="/" class="d-inline-flex link-body-emphasis text-decoration-none">
              <svg xmlns="http://www.w3.org/2000/svg" width="40" height="32" fill="currentColor" class="bi bi-calendar-check" viewBox="0 0 16 16">
                <path d="M10.854 7.146a.5.5 0 0 1 0 .708l-3 3a.5.5 0 0 1-.708 0l-1.5-1.5a.5.5 0 1 1 .708-.708L7.5 9.793l2.646-2.647a.5.5 0 0 1 .708 0"/>
                <path d="M3.5 0a.5.5 0 0 1 .5.5V1h8V.5a.5.5 0 0 1 1 0V1h1a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V3a2 2 0 0 1 2-2h1V.5a.5.5 0 0 1 .5-.5M1 4v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V4z"/>
              </svg>
            </a>
          </div>

          <ul class="nav col-12 col-md-auto mb-2 justify-content-center mb-md-0">
            <li><a href={% url "todo:index" %} class="nav-link px-2 link-secondary">Todo</a></li>
            <li><a href={% url "todo:category_index" %} class="nav-link px-2">Category</a></li>
          </ul>

          <div class="col-md-3 text-end">
            {% if user.is_authenticated %}
              <form action="{% url 'accounts:logout' %}" method="post">{%csrf_token %}
                <button type="submit" class="btn btn-outline-primary me-2">Logout</button>
              </form>
            {% else %}
            <button type="button" class="btn btn-outline-primary me-2" onclick="location.href='{% url "accounts:login" %}'">Login</button>
            <button type="button" class="btn btn-primary" onclick="location.href='{% url "accounts:signup" %}'">Sign-up</button>
            {% endif %}
          </div>
        </header>
      </div>

    <div id="content" class="container-fluid">
      {% block content %}{% endblock %}
    </div>

    <div class="container">
      <footer class="py-3 my-4">
        <ul class="nav justify-content-center border-bottom pb-3 mb-3">
          <li><a href={% url "todo:index" %} class="nav-link px-2 link-secondary">Todo</a></li>
          <li><a href={% url "todo:category_index" %} class="nav-link px-2">Category</a></li>
        </ul>
        <p class="text-center text-body-secondary">© 2024 Company, Inc</p>
      </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
  </body>
</html>
